<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Allocation Actions Integration Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4ec9b0;
        }
        h2 {
            color: #569cd6;
            margin-top: 30px;
        }
        .test-section {
            background-color: #252526;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #007acc;
            border-radius: 4px;
        }
        .success {
            color: #4ec9b0;
        }
        .error {
            color: #f48771;
        }
        .info {
            color: #4fc1ff;
        }
        .warning {
            color: #dcdcaa;
        }
        pre {
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 400px;
        }
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background-color: #1177bb;
        }
        #results {
            margin-top: 20px;
        }
        .stat-box {
            display: inline-block;
            background-color: #2d2d30;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 4px;
            border-left: 3px solid #569cd6;
        }
    </style>
</head>
<body>
    <h1>🧪 Allocation Actions Integration Test</h1>
    <p class="info">This page tests AllocationActions integration with Store, CapacityActions, AutoDistribution, and TeamHelpers.</p>

    <div class="test-section">
        <h2>Test Controls</h2>
        <button onclick="runAllTests()">Run All Tests</button>
        <button onclick="clearResults()">Clear Results</button>
        <button onclick="clearAllAllocations()">Clear All Allocations</button>
    </div>

    <div id="results"></div>

    <!-- Load dependencies in correct order -->
    <!-- 1. Store first -->
    <script src="src/renderer/js/store/app-store.js"></script>

    <!-- 2. Legacy components -->
    <script src="src/renderer/js/components/working-days-calculator.js"></script>
    <script src="src/renderer/js/utils/team-helpers.js"></script>
    <script src="src/renderer/js/components/auto-distribution.js"></script>

    <!-- 3. React bundles (includes CapacityActions and AllocationActions) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="src/renderer/assets/main.js"></script>

    <script>
        // Test utilities
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'test-section';

            const typeClass = type === 'success' ? 'success' :
                             type === 'error' ? 'error' :
                             type === 'warning' ? 'warning' : 'info';
            div.innerHTML = `<span class="${typeClass}">${message}</span>`;

            results.appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        function assert(condition, message) {
            if (condition) {
                log(`✅ PASS: ${message}`, 'success');
                return true;
            } else {
                log(`❌ FAIL: ${message}`, 'error');
                return false;
            }
        }

        function clearAllAllocations() {
            const store = window.appStore;
            if (store) {
                store.getState().setResourceAllocations([]);
                log('🗑️ All allocations cleared', 'info');
            }
        }

        // Initialize test environment
        function setupTestEnvironment() {
            log('<h2>Setting up test environment...</h2>');

            // Initialize store if not already
            if (!window.appStore) {
                log('❌ Store not initialized', 'error');
                return false;
            }

            const state = window.appStore.getState();

            // Set up mock global config with teams
            state.globalConfig = {
                teams: [
                    {
                        id: 'team-1',
                        name: 'Development Team',
                        members: [
                            {
                                id: 'member-1',
                                firstName: 'Mario',
                                lastName: 'Rossi',
                                email: 'mario.rossi@test.it',
                                role: 'Senior Developer',
                                vendorId: 'vendor-it',
                                vendorType: 'internal',
                                monthlyCapacity: 20,
                                country: 'IT',
                                vacationDays: {
                                    2025: ['2025-03-15', '2025-03-16'] // 2 vacation days in March
                                }
                            },
                            {
                                id: 'member-2',
                                firstName: 'Elena',
                                lastName: 'Popescu',
                                email: 'elena.popescu@test.ro',
                                role: 'Frontend Developer',
                                vendorId: 'vendor-ro',
                                vendorType: 'supplier',
                                monthlyCapacity: 22,
                                country: 'RO',
                                vacationDays: {
                                    2025: []
                                }
                            }
                        ]
                    }
                ],
                suppliers: [
                    { id: 'vendor-it', name: 'Internal IT', country: 'IT' },
                    { id: 'vendor-ro', name: 'Romanian Supplier', country: 'RO' }
                ]
            };

            // Initialize WorkingDaysCalculator instance
            if (typeof window.WorkingDaysCalculator === 'function') {
                window.WorkingDaysCalculator = new window.WorkingDaysCalculator();
                log('✅ WorkingDaysCalculator instance initialized', 'success');
            }

            // Clear allocations for clean test
            state.setResourceAllocations([]);

            log('✅ Test environment setup complete', 'success');
            return true;
        }

        // Test 1: Dependencies loaded
        function test1_DependenciesLoaded() {
            log('<h2>Test 1: Dependencies Loaded</h2>');

            assert(typeof window.appStore !== 'undefined', 'Store loaded');
            assert(typeof window.WorkingDaysCalculator !== 'undefined', 'WorkingDaysCalculator loaded');
            assert(typeof window.TeamHelpers !== 'undefined', 'TeamHelpers loaded');
            assert(typeof window.AutoDistribution !== 'undefined', 'AutoDistribution loaded');
            assert(typeof window.CapacityActions !== 'undefined', 'CapacityActions loaded');
            assert(typeof window.AllocationActions !== 'undefined', 'AllocationActions loaded');
        }

        // Test 2: Create allocation with auto-distribution
        function test2_CreateAllocationAutoDistribution() {
            log('<h2>Test 2: Create Allocation with Auto-Distribution</h2>');

            const allocationActions = new window.AllocationActions();

            const formData = {
                projectId: 'project-1',
                projectName: 'Test Website',
                teamMemberId: 'member-1',
                totalMDs: 45,
                startDate: '2025-03-01',
                endDate: '2025-05-31',
                notes: 'Test allocation for member-1'
            };

            log(`Creating allocation: ${formData.totalMDs} MDs from ${formData.startDate} to ${formData.endDate}`);

            const result = allocationActions.createAllocation(formData);

            log(`<pre>${JSON.stringify(result, null, 2)}</pre>`);

            assert(result.success === true, 'Allocation created successfully');
            assert(result.allocationId !== undefined, 'Allocation ID assigned');
            assert(result.allocation !== undefined, 'Allocation object returned');
            assert(result.allocation.monthlyAllocations !== undefined, 'Monthly allocations generated');

            // Check monthly allocations
            const months = Object.keys(result.allocation.monthlyAllocations);
            log(`Allocated across ${months.length} months: ${months.join(', ')}`);

            let totalAllocated = 0;
            months.forEach(month => {
                const mds = result.allocation.monthlyAllocations[month].planned;
                totalAllocated += mds;
                log(`${month}: ${mds} MDs`);
            });

            log(`Total allocated: ${totalAllocated} MDs`);
            assert(totalAllocated <= formData.totalMDs, 'Total allocated does not exceed requested MDs');

            return result.allocationId;
        }

        // Test 3: Read operations
        function test3_ReadOperations(allocationId) {
            log('<h2>Test 3: Read Operations</h2>');

            const allocationActions = new window.AllocationActions();

            // Get by ID
            const allocation = allocationActions.getAllocationById(allocationId);
            assert(allocation !== null, 'getAllocationById returns allocation');
            assert(allocation.id === allocationId, 'Allocation ID matches');

            // Get for member
            const memberAllocations = allocationActions.getAllocationsForMember('member-1');
            assert(memberAllocations.length === 1, 'getAllocationsForMember returns 1 allocation');

            // Get for project
            const projectAllocations = allocationActions.getAllocationsForProject('project-1');
            assert(projectAllocations.length === 1, 'getAllocationsForProject returns 1 allocation');

            // Get for month
            const monthAllocations = allocationActions.getAllocationsForMonth('member-1', '2025-03');
            log(`Allocations for March 2025: ${monthAllocations.length}`);
            assert(monthAllocations.length >= 0, 'getAllocationsForMonth executes');

            // Get all
            const allAllocations = allocationActions.getAllAllocations();
            assert(allAllocations.length === 1, 'getAllAllocations returns 1 allocation');
        }

        // Test 4: Update operations
        function test4_UpdateOperations(allocationId) {
            log('<h2>Test 4: Update Operations</h2>');

            const allocationActions = new window.AllocationActions();

            // Update notes
            const updateResult = allocationActions.updateAllocation(allocationId, {
                notes: 'Updated test allocation'
            });

            assert(updateResult.success === true, 'Update allocation succeeded');

            const updated = allocationActions.getAllocationById(allocationId);
            assert(updated.notes === 'Updated test allocation', 'Notes updated correctly');

            // Update monthly allocation
            const monthUpdateResult = allocationActions.updateMonthlyAllocation(allocationId, '2025-03', 15);
            assert(monthUpdateResult.success === true, 'Update monthly allocation succeeded');

            const afterMonthUpdate = allocationActions.getAllocationById(allocationId);
            assert(afterMonthUpdate.monthlyAllocations['2025-03'].planned === 15, 'Monthly MDs updated to 15');
        }

        // Test 5: Validation
        function test5_Validation() {
            log('<h2>Test 5: Validation</h2>');

            const allocationActions = new window.AllocationActions();

            // Invalid: missing team member
            const invalid1 = allocationActions.validateAllocation({
                projectId: 'project-1',
                teamMemberId: '',
                totalMDs: 10,
                startDate: '2025-03-01',
                endDate: '2025-03-31'
            });

            assert(invalid1.isValid === false, 'Validation fails for empty team member ID');
            log(`Errors: ${invalid1.errors.join(', ')}`);

            // Invalid: start date after end date
            const invalid2 = allocationActions.validateAllocation({
                projectId: 'project-1',
                teamMemberId: 'member-1',
                totalMDs: 10,
                startDate: '2025-05-01',
                endDate: '2025-03-01'
            });

            assert(invalid2.isValid === false, 'Validation fails for start date after end date');
            log(`Errors: ${invalid2.errors.join(', ')}`);

            // Valid allocation
            const valid = allocationActions.validateAllocation({
                projectId: 'project-1',
                teamMemberId: 'member-1',
                totalMDs: 10,
                startDate: '2025-03-01',
                endDate: '2025-03-31'
            });

            assert(valid.isValid === true, 'Validation passes for valid allocation');
        }

        // Test 6: Overflow detection
        function test6_OverflowDetection() {
            log('<h2>Test 6: Overflow Detection</h2>');

            const allocationActions = new window.AllocationActions();

            // Create allocation that should cause overflow
            const overflowFormData = {
                projectId: 'project-2',
                projectName: 'Overflow Test',
                teamMemberId: 'member-1',
                totalMDs: 100, // Very high MDs
                startDate: '2025-06-01',
                endDate: '2025-06-30',
                notes: 'Should overflow'
            };

            const result = allocationActions.createAllocation(overflowFormData);

            log(`<pre>${JSON.stringify(result, null, 2)}</pre>`);

            if (result.hasOverflow) {
                log(`⚠️ Overflow detected: ${result.overflowAmount} MDs could not be allocated`, 'warning');
                assert(result.overflowAmount > 0, 'Overflow amount is positive');
            } else {
                log('✅ No overflow (member has sufficient capacity)', 'success');
            }

            return result.allocationId;
        }

        // Test 7: Check member availability
        function test7_MemberAvailability() {
            log('<h2>Test 7: Check Member Availability</h2>');

            const allocationActions = new window.AllocationActions();

            const availability = allocationActions.checkMemberAvailability(
                'member-1',
                '2025-07-01',
                '2025-09-30'
            );

            log(`<pre>${JSON.stringify(availability, null, 2)}</pre>`);

            assert(availability.availabilityByMonth !== undefined, 'Availability by month calculated');
            assert(typeof availability.overallUtilization === 'number', 'Overall utilization calculated');

            log(`Overall utilization: ${availability.overallUtilization.toFixed(1)}%`);

            if (availability.constraints && availability.constraints.length > 0) {
                log(`⚠️ Constraints found: ${availability.constraints.join(', ')}`, 'warning');
            }
        }

        // Test 8: Calculate project end date
        function test8_CalculateEndDate() {
            log('<h2>Test 8: Calculate Project End Date</h2>');

            const allocationActions = new window.AllocationActions();

            const endDate = allocationActions.calculateProjectEndDate(
                '2025-10-01',
                60, // 60 MDs
                'member-1'
            );

            log(`Start: 2025-10-01, Total MDs: 60`);
            log(`Estimated end date: ${endDate}`);

            assert(endDate !== undefined, 'End date calculated');
            assert(new Date(endDate) > new Date('2025-10-01'), 'End date is after start date');
        }

        // Test 9: Delete allocation
        function test9_DeleteAllocation(allocationId) {
            log('<h2>Test 9: Delete Allocation</h2>');

            const allocationActions = new window.AllocationActions();

            const deleteResult = allocationActions.deleteAllocation(allocationId);

            assert(deleteResult.success === true, 'Delete allocation succeeded');

            const deleted = allocationActions.getAllocationById(allocationId);
            assert(deleted === null, 'Allocation no longer exists after deletion');
        }

        // Test 10: Cross-project allocations
        function test10_CrossProjectAllocations() {
            log('<h2>Test 10: Cross-Project Allocations</h2>');

            const allocationActions = new window.AllocationActions();

            // Create allocation for project A
            const alloc1 = allocationActions.createAllocation({
                projectId: 'project-A',
                projectName: 'Project A',
                teamMemberId: 'member-2',
                totalMDs: 30,
                startDate: '2025-11-01',
                endDate: '2025-11-30'
            });

            log(`Project A allocation: ${alloc1.allocationId}`);

            // Create allocation for project B (same member, overlapping dates)
            const alloc2 = allocationActions.createAllocation({
                projectId: 'project-B',
                projectName: 'Project B',
                teamMemberId: 'member-2',
                totalMDs: 25,
                startDate: '2025-11-01',
                endDate: '2025-11-30'
            });

            log(`Project B allocation: ${alloc2.allocationId}`);

            // Check allocations for member
            const memberAllocs = allocationActions.getAllocationsForMember('member-2');
            assert(memberAllocs.length === 2, 'Member has 2 allocations across 2 projects');

            // Check November capacity
            const capacityActions = new window.CapacityActions();
            const novCapacity = capacityActions.calculateAvailableCapacity('member-2', '2025-11');

            log(`<pre>${JSON.stringify(novCapacity, null, 2)}</pre>`);

            const totalAllocated = (alloc1.allocation.monthlyAllocations['2025-11']?.planned || 0) +
                                  (alloc2.allocation.monthlyAllocations['2025-11']?.planned || 0);

            log(`Total allocated in November: ${totalAllocated} MDs`);
            log(`Monthly capacity: ${novCapacity.monthlyCapacity} MDs`);
            log(`Utilization: ${novCapacity.utilization.toFixed(1)}%`);

            if (novCapacity.isOverallocated) {
                log(`⚠️ Member is over-allocated in November!`, 'warning');
            }
        }

        // Run all tests
        function runAllTests() {
            clearResults();

            log('<h1>🧪 Running Allocation Actions Integration Tests</h1>');

            if (!setupTestEnvironment()) {
                log('❌ Test environment setup failed. Cannot continue.', 'error');
                return;
            }

            try {
                test1_DependenciesLoaded();

                const allocId1 = test2_CreateAllocationAutoDistribution();

                test3_ReadOperations(allocId1);

                test4_UpdateOperations(allocId1);

                test5_Validation();

                const overflowAllocId = test6_OverflowDetection();

                test7_MemberAvailability();

                test8_CalculateEndDate();

                test10_CrossProjectAllocations();

                // Delete test allocations
                test9_DeleteAllocation(allocId1);
                if (overflowAllocId) {
                    test9_DeleteAllocation(overflowAllocId);
                }

                log('<h2 class="success">✅ All tests completed!</h2>', 'success');

                // Show final stats
                const store = window.appStore;
                const finalAllocations = store.getState().resourceAllocations || [];
                log(`<div class="stat-box">Final allocations count: ${finalAllocations.length}</div>`);

            } catch (error) {
                log(`<h2 class="error">❌ Test failed with error:</h2><pre>${error.stack}</pre>`, 'error');
            }
        }

        // Auto-message on load
        window.addEventListener('load', () => {
            log('<p class="info">Page loaded. Click "Run All Tests" to start testing.</p>');
        });
    </script>
</body>
</html>
