<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capacity Timeline Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load dependencies in correct order -->
    <!-- 1. Store first -->
    <script src="src/renderer/js/store/app-store.js"></script>

    <!-- 2. Legacy components -->
    <script src="src/renderer/js/components/working-days-calculator.js"></script>
    <script src="src/renderer/js/utils/team-helpers.js"></script>
    <script src="src/renderer/js/components/auto-distribution.js"></script>

    <!-- 3. React bundles (includes all components and actions) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="src/renderer/assets/main.js"></script>

    <script>
        // Setup test environment
        function setupTestEnvironment() {
            console.log('🔧 Setting up test environment...');

            const state = window.appStore.getState();

            // Set up mock global config with teams
            state.globalConfig = {
                teams: [
                    {
                        id: 'team-dev',
                        name: 'Development Team',
                        members: [
                            {
                                id: 'dev-1',
                                firstName: 'Mario',
                                lastName: 'Rossi',
                                email: 'mario.rossi@company.it',
                                role: 'Senior Full-Stack Developer',
                                vendorId: 'vendor-it',
                                vendorType: 'internal',
                                monthlyCapacity: 20,
                                country: 'IT',
                                vacationDays: {
                                    2025: [
                                        '2025-03-15', '2025-03-16', // March
                                        '2025-08-10', '2025-08-11', '2025-08-12' // August
                                    ]
                                }
                            },
                            {
                                id: 'dev-2',
                                firstName: 'Elena',
                                lastName: 'Popescu',
                                email: 'elena.popescu@supplier.ro',
                                role: 'Frontend Developer',
                                vendorId: 'vendor-ro',
                                vendorType: 'supplier',
                                monthlyCapacity: 22,
                                country: 'RO',
                                vacationDays: {
                                    2025: ['2025-07-01', '2025-07-02', '2025-07-03']
                                }
                            },
                            {
                                id: 'dev-3',
                                firstName: 'Giovanni',
                                lastName: 'Bianchi',
                                email: 'giovanni.bianchi@company.it',
                                role: 'Backend Developer',
                                vendorId: 'vendor-it',
                                vendorType: 'internal',
                                monthlyCapacity: 18,
                                country: 'IT',
                                vacationDays: {
                                    2025: []
                                }
                            },
                            {
                                id: 'dev-4',
                                firstName: 'Ana',
                                lastName: 'Ionescu',
                                email: 'ana.ionescu@supplier.ro',
                                role: 'UI/UX Designer',
                                vendorId: 'vendor-ro',
                                vendorType: 'supplier',
                                monthlyCapacity: 20,
                                country: 'RO',
                                vacationDays: {
                                    2025: ['2025-05-01', '2025-05-02']
                                }
                            },
                            {
                                id: 'dev-5',
                                firstName: 'Luca',
                                lastName: 'Verdi',
                                email: 'luca.verdi@company.it',
                                role: 'Senior Full-Stack Developer',
                                vendorId: 'vendor-it',
                                vendorType: 'internal',
                                monthlyCapacity: 22,
                                country: 'IT',
                                vacationDays: {
                                    2025: ['2025-04-20', '2025-04-21', '2025-04-22', '2025-04-23', '2025-04-24']
                                }
                            },
                            {
                                id: 'dev-6',
                                firstName: 'Alexandru',
                                lastName: 'Mihai',
                                email: 'alexandru.mihai@supplier.ro',
                                role: 'Backend Developer',
                                vendorId: 'vendor-ro',
                                vendorType: 'supplier',
                                monthlyCapacity: 20,
                                country: 'RO',
                                vacationDays: {
                                    2025: []
                                }
                            }
                        ]
                    }
                ],
                suppliers: [
                    { id: 'vendor-it', name: 'Internal Team Italy', country: 'IT' },
                    { id: 'vendor-ro', name: 'Romanian Software House', country: 'RO' }
                ],
                internalResources: [
                    { id: 'vendor-it', name: 'Internal Team Italy', country: 'IT' }
                ]
            };

            // Initialize WorkingDaysCalculator instance
            if (typeof window.WorkingDaysCalculator === 'function') {
                window.WorkingDaysCalculator = new window.WorkingDaysCalculator();
                console.log('✅ WorkingDaysCalculator instance initialized');
            }

            // Set up test allocations across multiple months for realistic timeline
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth() + 1; // 1-12

            // Generate allocations for current month and next 5 months
            const allocations = [];

            // Mario - heavily allocated most months
            for (let i = 0; i < 6; i++) {
                const month = currentMonth + i;
                const year = month > 12 ? currentYear + 1 : currentYear;
                const monthStr = month > 12 ? month - 12 : month;
                const monthFormatted = `${year}-${String(monthStr).padStart(2, '0')}`;

                allocations.push({
                    id: `alloc-mario-${i}`,
                    projectId: 'project-a',
                    projectName: 'E-Commerce Platform',
                    teamMemberId: 'dev-1',
                    monthlyAllocations: {
                        [monthFormatted]: { planned: i % 2 === 0 ? 18 : 16, actual: i % 2 === 0 ? 18 : 16 }
                    }
                });
            }

            // Elena - moderate allocation
            for (let i = 0; i < 4; i++) {
                const month = currentMonth + i;
                const year = month > 12 ? currentYear + 1 : currentYear;
                const monthStr = month > 12 ? month - 12 : month;
                const monthFormatted = `${year}-${String(monthStr).padStart(2, '0')}`;

                allocations.push({
                    id: `alloc-elena-${i}`,
                    projectId: 'project-b',
                    projectName: 'Mobile App',
                    teamMemberId: 'dev-2',
                    monthlyAllocations: {
                        [monthFormatted]: { planned: 15, actual: 15 }
                    }
                });
            }

            // Giovanni - under-allocated
            const month1 = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
            const month2 = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            allocations.push({
                id: 'alloc-giovanni-1',
                projectId: 'project-c',
                projectName: 'API Gateway',
                teamMemberId: 'dev-3',
                monthlyAllocations: {
                    [month1]: { planned: 8, actual: 8 },
                    [month2]: { planned: 10, actual: 10 }
                }
            });

            // Luca - OVER-allocated in some months
            for (let i = 0; i < 5; i++) {
                const month = currentMonth + i;
                const year = month > 12 ? currentYear + 1 : currentYear;
                const monthStr = month > 12 ? month - 12 : month;
                const monthFormatted = `${year}-${String(monthStr).padStart(2, '0')}`;

                allocations.push({
                    id: `alloc-luca-${i}`,
                    projectId: 'project-a',
                    projectName: 'E-Commerce Platform',
                    teamMemberId: 'dev-5',
                    monthlyAllocations: {
                        [monthFormatted]: { planned: i % 3 === 0 ? 24 : 20, actual: i % 3 === 0 ? 24 : 20 } // 24 > 22 capacity
                    }
                });
            }

            // Ana - steady allocation
            for (let i = 0; i < 3; i++) {
                const month = currentMonth + i;
                const year = month > 12 ? currentYear + 1 : currentYear;
                const monthStr = month > 12 ? month - 12 : month;
                const monthFormatted = `${year}-${String(monthStr).padStart(2, '0')}`;

                allocations.push({
                    id: `alloc-ana-${i}`,
                    projectId: 'project-d',
                    projectName: 'Design System',
                    teamMemberId: 'dev-4',
                    monthlyAllocations: {
                        [monthFormatted]: { planned: 12, actual: 12 }
                    }
                });
            }

            state.setResourceAllocations(allocations);

            console.log('✅ Test environment setup complete');
            console.log(`📊 ${allocations.length} test allocations created across 6 months`);
        }

        // Render timeline
        function renderTimeline() {
            const root = document.getElementById('root');
            if (!root) {
                console.error('Root element not found');
                return;
            }

            // Check if React and components are loaded
            if (!window.React || !window.ReactDOM || !window.ReactComponents) {
                console.error('React or components not loaded');
                setTimeout(renderTimeline, 100);
                return;
            }

            const CapacityTimeline = window.ReactComponents.CapacityTimeline;
            if (!CapacityTimeline) {
                console.error('CapacityTimeline component not found');
                console.log('Available components:', Object.keys(window.ReactComponents));
                return;
            }

            console.log('🎨 Rendering CapacityTimeline...');

            // Create React root and render
            const reactRoot = window.ReactDOM.createRoot(root);
            reactRoot.render(
                window.React.createElement(CapacityTimeline, {
                    monthsToShow: 6,
                    onMemberClick: (member) => {
                        console.log('Member clicked:', member);
                        alert(`Clicked: ${member.fullName}\nRole: ${member.role}`);
                    },
                    onCellClick: (month, memberName, data) => {
                        console.log('Cell clicked:', { month, memberName, data });
                        alert(
                            `${memberName} - ${month}\n\n` +
                            `Allocated: ${data.existingAllocations} MD\n` +
                            `Available: ${data.availableCapacity} MD\n` +
                            `Utilization: ${data.utilization.toFixed(1)}%\n` +
                            `Status: ${data.status}`
                        );
                    }
                })
            );

            console.log('✅ Timeline rendered successfully');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            console.log('🚀 Page loaded, initializing...');

            // Setup test environment
            setupTestEnvironment();

            // Wait a bit for everything to load, then render
            setTimeout(renderTimeline, 100);
        });
    </script>
</body>
</html>
