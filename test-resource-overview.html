        // Render dashboard
        function renderDashboard() {
            const root = document.getElementById('root');
            if (!root) {
                console.error('Root element not found');
                return;
            }

            // Check if React and components are loaded
            if (!window.React || !window.ReactDOM || !window.ReactComponents) {
                console.error('React or components not loaded');
                setTimeout(renderDashboard, 100);
                return;
            }

            const ResourceOverviewDashboard = window.ReactComponents.ResourceOverviewDashboard;
            if (!ResourceOverviewDashboard) {
                console.error('ResourceOverviewDashboard component not found');
                return;
            }

            console.log('🎨 Rendering ResourceOverviewDashboard...');

            // Create React root and render
            const reactRoot = window.ReactDOM.createRoot(root);
            reactRoot.render(
                window.React.createElement(ResourceOverviewDashboard, {
                    onMemberClick: (member) => {
                        console.log('Member clicked:', member);
                        alert(`Clicked: ${member.fullName}\nRole: ${member.role}\nUtilization: ${member.utilization.toFixed(1)}%`);
                    }
                })
            );

            console.log('✅ Dashboard rendered successfully');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            console.log('🚀 Page loaded, initializing...');

            // Setup test environment
            setupTestEnvironment();

            // Wait a bit for everything to load, then render
            setTimeout(renderDashboard, 100);
        });
    </script>
</body>
</html>
